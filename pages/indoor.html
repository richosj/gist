<!DOCTYPE html>
<html lang="ko">
  <head>
    <!-- include partials/head.html -->
  </head>
  <body>
    <a href="#main" class="skip-link">본문으로 건너뛰기</a>
    <div id="app" class="app-root">
      <!-- include partials/header.html -->
      <div class="app-body app-body--map" id="main" tabindex="-1">
        <aside class="panel-left">
          <div class="panel-left-header">
            <span class="panel-left-title">실내지도</span>
            <button type="button" class="panel-left-close" data-panel-close aria-label="닫기"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="panel-left-body">
            <p class="panel-intro">다중 반경 (multi-Ring) 영향권 분석</p>
            <p class="panel-intro">해당지역의 생활 편의시설 접근성 진단.</p>
            <button type="button" class="btn-secondary btn-sm">사용법 및 산출방식</button>
            <div class="form-group">
              <label class="form-label-sm">기준점 설정</label>
              <input type="text" class="input-text" placeholder="경상북도 포항시 남구 시청로 1" />
              <p class="form-hint">지도 클릭으로 위치 설정</p>
            </div>
            <div class="facility-list">
              <div class="data-list-item facility-item" data-facility="419">
                <span class="data-list-item-title">4.19기념관</span>
                <span class="data-list-item-meta">건물 &gt; 공공문화시설</span>
              </div>
              <div class="data-list-item facility-item">
                <span class="data-list-item-title">강남역</span>
                <span class="data-list-item-meta">교통시설 &gt; 지하철역</span>
              </div>
            </div>
            <div class="pagination-wrap" data-pagination-total="16">
              <button type="button" class="pagination-btn" data-pagination="prev" title="이전"><i class="fa-solid fa-chevron-left"></i></button>
              <span class="pagination-text">1 / 16</span>
              <button type="button" class="pagination-btn" data-pagination="next" title="다음"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
          </div>
        </aside>
        <main class="map-wrap">
          <div class="map-container"><span class="map-placeholder">지도 영역</span></div>
          <!-- include partials/map-controls.html -->
          <div class="building-overlay" id="overlay-419" hidden>
            <div class="building-overlay-header">
              <span class="building-overlay-title">4.19기념관</span>
              <button type="button" class="panel-left-close" data-overlay-close aria-label="닫기"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="building-overlay-body">
              <p class="data-list-item-meta">건물 &gt; 공공문화시설</p>
              <p class="building-address">도로명 경상북도 1234</p>
              <p class="building-address">지번 경상북도 1234</p>
              <div class="floor-tabs">
                <button type="button" class="floor-tab active">B1</button>
                <button type="button" class="floor-tab">1F</button>
                <button type="button" class="floor-tab">2F</button>
                <button type="button" class="floor-tab">3F</button>
              </div>
              <details class="accordion">
                <summary>출입구정보 +</summary>
                <p>출입구 안내 내용</p>
              </details>
              <p>층별안내</p>
              <button type="button" class="btn-primary btn-sm btn-block">등록 안내</button>
            </div>
          </div>
        </main>
      </div>
      <!-- include partials/footer.html -->
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
